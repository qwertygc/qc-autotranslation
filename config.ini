[translation]
# Provider: argostranslate, deepl, or lindat
provider = argostranslate

# DeepL API key (required only if provider = deepl)
# Get your key from https://www.deepl.com/pro-api
deepl_key = 

# Optional: DeepL API endpoint (default: https://api-free.deepl.com/v2/translate)
# For Pro users: https://api.deepl.com/v2/translate
deepl_endpoint = https://api-free.deepl.com/v2/translate

# Optional: LINDAT API endpoint (default: https://lindat.mff.cuni.cz/services/translation/api/v2)
# No API key required for LINDAT
lindat_endpoint = https://lindat.mff.cuni.cz/services/translation/api/v2
